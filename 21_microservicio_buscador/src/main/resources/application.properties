spring.application.name=21_microservicio_buscador
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
#tambien se puede poner ip, no es recomendable, mejor variable de entorno
spring.datasource.url=jdbc:mysql://${HOST_DB}:${PORT_DB}/buscador 
spring.datasource.username=${USER_DB}
spring.datasource.password=${PASS_DB}
spring.jpa.show-sql=true
#propiedades para que hibernate cree adecuadamente las instrucciones SQL
spring.jpa.hibernate.naming.implicit-strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
#<html xmlns:th="http://www.thymeleaf.org">

server.servlet.context-path=/buscador
server.port=9001