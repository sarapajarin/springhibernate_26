spring.application.name=21_microservicio_buscador
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/buscador
spring.datasource.username=root
spring.datasource.password=root
spring.jpa.show-sql=true
#propiedades para que hibernate cree adecuadamente las instrucciones SQL
spring.jpa.hibernate.naming.implicit-strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
#<html xmlns:th="http://www.thymeleaf.org">

server.servlet.context-path=/buscador
server.port=9001