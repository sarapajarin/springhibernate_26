spring.application.name=22_microservicio_alumnoscurso
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/alumnoscursos
spring.datasource.username=root
spring.datasource.password=root
spring.jpa.show-sql=true
#propiedades para que hibernate cree adecuadamente las instrucciones SQL
spring.jpa.hibernate.naming.implicit-strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
#<html xmlns:th="http://www.thymeleaf.org">
server.servlet.context-path=/escuela
server.port= 8005
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8080/realms/springrealm
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${spring.security.oauth2.resourceserver.jwt.issuer-uri}/protocol/openid-connect/certs
keycloak.clientId=springclient