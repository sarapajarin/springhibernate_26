spring:
  application:
    name: servidor-gateway   
  cloud: 
    gateway:
      server:
        webflux:
          default-filters:
          - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin 
          globalcors:
            corsConfigurations:
              '[/**]':
                allowedOrigins: "*"
                allowedMethods: "*"
                allowedHeaders: "*" 
          routes:
          - id: servProductos #Id de la ruta 
            uri: lb://servicio-productos
            predicates:
              - Path=/sProductos/** #Cuando Gateway detecte que en la peticion URL venga este path, enrutara la peticion hacia el servicio indicado en la propiedad "uri" (lb://servicio-productos)
            filters:
              - RewritePath=/sProductos/*, / #Lo que indica es que a la url indicada en la propiedad "uri", se le adicionará un "/" mas todo lo que venga despues de "sproductos" en la petición URL de entrada   
          - id: servPedidos #Id de la ruta 
            uri: lb://servicio-pedidos
            predicates:
              - Path=/sPedidos/** #Cuando Gateway detecte que en la peticion URL venga este path, enrutara la peticion hacia el servicio indicado en la propiedad "uri" (lb://servicio-productos)
            filters:
              - RewritePath=/sPedidos/*, / #Lo que indica es que a la url indicada en la propiedad "uri", se le adicionará un "/" mas todo lo que venga despues de "sproductos" en la petición URL de entrada                                      
server:
  port: 10000